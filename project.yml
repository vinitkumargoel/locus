name: Locus

options:
  bundleIdPrefix: com.locus
  deploymentTarget:
    macOS: "14.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "6.29.3"

targets:
  Locus:
    type: application
    platform: macOS
    sources:
      - path: Locus
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_NAME: Locus
        PRODUCT_BUNDLE_IDENTIFIER: com.locus.app
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Locus/Locus.entitlements
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Locus records your microphone to transcribe meetings on-device."
        INFOPLIST_KEY_NSAudioCaptureUsageDescription: "Locus captures the other participants' audio from your meeting app to transcribe it on-device."

schemes:
  Locus:
    build:
      targets:
        Locus: all
    run:
      config: Debug
