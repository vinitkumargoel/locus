name: Locus

options:
  bundleIdPrefix: com.locus
  deploymentTarget:
    macOS: "14.2"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Locus:
    type: application
    platform: macOS
    sources:
      - path: Locus
    settings:
      base:
        PRODUCT_NAME: Locus
        PRODUCT_BUNDLE_IDENTIFIER: com.locus.app
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Locus records your microphone to transcribe meetings on-device."

schemes:
  Locus:
    build:
      targets:
        Locus: all
    run:
      config: Debug
